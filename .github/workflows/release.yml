name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        shell: bash
        run: |
          curl -fsSL "https://ziglang.org/download/0.15.1/zig-x86_64-linux-0.15.1.tar.xz" -o zig.tar.xz
          mkdir -p "$HOME/zig"
          tar -xJf zig.tar.xz -C "$HOME/zig"
          ZIG_DIR=$(find "$HOME/zig" -maxdepth 1 -type d -name "zig-*" | head -n 1)
          echo "$ZIG_DIR" >> $GITHUB_PATH
          "$ZIG_DIR/zig" version

      - name: Build all targets
        run: zig build release

      - name: List output
        run: ls -la zig-out/release/

      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: zig-out/release/*
          draft: true
          generate_release_notes: true
          fail_on_unmatched_files: true
