name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64-avx2
            runner: ubuntu-latest
            cpu: x86_64_v3
            ext: ''
          - name: linux-x86_64-sse2
            runner: ubuntu-latest
            cpu: x86_64+cx16
            ext: ''
          - name: linux-aarch64
            runner: ubuntu-24.04-arm
            cpu: baseline
            ext: ''
          - name: windows-x86_64-avx2
            runner: windows-latest
            cpu: x86_64_v3
            ext: '.exe'
          - name: windows-x86_64-sse2
            runner: windows-latest
            cpu: x86_64+cx16
            ext: '.exe'
          - name: macos-x86_64-avx2
            runner: macos-13
            cpu: x86_64_v3
            ext: ''
          - name: macos-aarch64
            runner: macos-latest
            cpu: baseline
            ext: ''

    steps:
      - uses: actions/checkout@v4

      - name: Setup macOS SDK
        if: runner.os == 'macOS'
        shell: bash
        run: echo "SDKROOT=$(xcrun --sdk macosx --show-sdk-path)" >> $GITHUB_ENV

      - name: Install Zig (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          ZIG_VERSION="0.15.1"
          case "${{ runner.os }}-${{ runner.arch }}" in
            Linux-X64)    ZIG_ARCH="x86_64-linux" ;;
            Linux-ARM64)  ZIG_ARCH="aarch64-linux" ;;
            macOS-X64)    ZIG_ARCH="x86_64-macos" ;;
            macOS-ARM64)  ZIG_ARCH="aarch64-macos" ;;
            *) echo "Unsupported"; exit 1 ;;
          esac
          curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-${ZIG_ARCH}-${ZIG_VERSION}.tar.xz" -o zig.tar.xz
          mkdir -p "$HOME/zig"
          tar -xJf zig.tar.xz -C "$HOME/zig"
          ZIG_DIR=$(find "$HOME/zig" -maxdepth 1 -type d -name "zig-*" | head -n 1)
          echo "$ZIG_DIR" >> $GITHUB_PATH
          "$ZIG_DIR/zig" version

      - name: Install Zig (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ZIG_VERSION = "0.15.1"
          $URL = "https://ziglang.org/download/$ZIG_VERSION/zig-x86_64-windows-$ZIG_VERSION.zip"
          Invoke-WebRequest -Uri $URL -OutFile zig.zip
          Expand-Archive -Path zig.zip -DestinationPath "$env:USERPROFILE\zig"
          $ZIG_DIR = (Get-ChildItem -Path "$env:USERPROFILE\zig" -Directory -Filter "zig-*" | Select-Object -First 1).FullName
          Add-Content -Path $env:GITHUB_PATH -Value $ZIG_DIR
          & "$ZIG_DIR\zig.exe" version

      - name: Build
        shell: bash
        run: zig build -Doptimize=ReleaseFast -Dcpu=${{ matrix.cpu }}

      - name: Run bench
        shell: bash
        run: |
          BINARY="./zig-out/bin/Ursus${{ matrix.ext }}"
          echo "=== Running bench on ${{ matrix.name }} ==="

          EXPECTED=$("$BINARY" bench-expected | tr -d '[:space:]')
          echo "Expected nodes: $EXPECTED"

          OUTPUT=$("$BINARY" bench)
          echo "$OUTPUT"

          LAST_LINE=$(echo "$OUTPUT" | tail -n 1)
          if ! echo "$LAST_LINE" | grep -qE '[0-9]+ nodes [0-9]+ nps'; then
            echo "::error::bench output didn't match expected format"
            exit 1
          fi

          NODES=$(echo "$LAST_LINE" | grep -oE '^[0-9]+')
          echo "Actual nodes:   $NODES"

          if [ "$NODES" != "$EXPECTED" ]; then
            echo "::error::bench mismatch on ${{ matrix.name }}: got $NODES, expected $EXPECTED"
            exit 1
          fi

          echo "### ✅ Bench ${{ matrix.name }}: $NODES nodes" >> $GITHUB_STEP_SUMMARY

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p release
          cp "zig-out/bin/Ursus${{ matrix.ext }}" "release/ursus-${{ matrix.name }}${{ matrix.ext }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ursus-${{ matrix.name }}
          path: release/ursus-${{ matrix.name }}${{ matrix.ext }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: create-release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          draft: true
          generate_release_notes: true
          fail_on_unmatched_files: true
